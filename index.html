<!DOCTYPE html>
<html lang="ca">
<head>

  <link rel="stylesheet" href="css/banner-smx.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Caja del contador (pill) */
    .visits {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 10;

      display: inline-flex;
      align-items: center;

      padding: 6px 10px;
      border-radius: 12px;

      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .visits img {
      display: block;
      height: 18px; /* ajusta tamaño del badge */
    }
  </style>
</head>
<body>

<section class="smx-banner">

  <div class="hero-bg"></div>

  <!-- CONTADOR DE VISITAS (badge) -->

    <img

      src="https://api.visitorbadge.io/api/visitors?path=lorenasanchezsanchez%2FfiraCicles&countColor=%23263759"
    />
  </div>

  <div class="banner-content">
    <!-- HERO -->
    <h1 class="title-animated">
      <span>Sistemes Microinformàtics i Xarxes</span>
    </h1>

    <!-- NAVEGACIÓN DEL BANNER -->

      <span data-content="pla">⏱ 2000 hores</span>
      <span data-content="centre">🏫 IES Benigasló</span>

</section>
