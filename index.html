<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>SMX · IES Benigasló</title>

  <link rel="stylesheet" href="css/banner-smx.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<section class="smx-banner">

  <div class="hero-bg"></div>

<!-- CONTADOR DE VISITAS -->
<div class="visits" style="position:absolute; right:16px; top:16px; font-size:14px; opacity:.9; z-index:10; color:#fff;">
  Visites: <span id="visit-count">...</span>
</div>

<script>
  (async () => {
    try {
      const url = "https://api.visitorbadge.io/api/visitors?path=lorenasanchezsanchez%2FfiraCicles";
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();
      // La API suele devolver "visitors" o "total"
      const n = data?.visitors ?? data?.total ?? data?.count;
      document.getElementById("visit-count").textContent = (n ?? "0");
    } catch (e) {
      document.getElementById("visit-count").textContent = "";
    }
  })();
</script>

  
  <div class="banner-content">
    <!-- HERO -->
    <h1 class="title-animated">
      <span>Sistemes Microinformàtics i Xarxes</span>
    </h1>


    <!-- NAVEGACIÓN DEL BANNER -->
    <div class="highlights">
      <span data-content="pla">⏱ 2000 hores</span>
      <span data-content="centre">🏫 IES Benigasló</span>
      <span data-content="continu">🚀 Continuïtat formativa</span>
      <span data-content="eixides">💼 Eixides professionals</span>
      <span data-content="oferim">🧰 Oferim</span>
    </div>
  </div>

  <!-- PANEL CENTRAL REAL -->
  <div id="dynamic-content" class="dynamic-content"></div>

 
</section>

<script src="js/banner-smx.js"></script>
</body>
</html>
