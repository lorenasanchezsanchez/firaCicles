<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>SMX · IES Benigasló</title>

  <link rel="stylesheet" href="css/banner-smx.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<section class="smx-banner">

  <div class="hero-bg"></div>

  <!-- CONTADOR DE VISITAS (badge) -->
  <div class="visits">
    <img
      alt="Visitors"
      src="https://api.visitorbadge.io/api/visitors?path=lorenasanchezsanchez%2FfiraCicles&countColor=%23263759"
    />
  </div>

  <!-- GLOBO DE ALERTA -->
  <div class="alert-bubble" role="alert">
    <span class="alert-bubble__label">MATRÍCULA ONLINE</span>
    <span class="alert-bubble__text">
      Procés d'admissió: del 23/05/26 al 02/06/26<br>Matrícula: del 24/06/26 al 02/06/26
    </span>
  </div>

  <div class="banner-content">
    <!-- HERO -->
    <h1 class="title-animated">
      <span>Sistemes Microinformàtics i Xarxes</span>
    </h1>

    <!-- NAVEGACIÓN DEL BANNER -->
    <div class="highlights">
      <span data-content="coneixerns">🎥 Vine a<br>conéixer-nos</span>
      <span data-content="pla">⏱ Pla <br> Formatiu</span>
      <span data-content="centre">🏫 IES Benigasló</span>
      <span data-content="continu">🚀 Continuïtat<br>formativa</span>
      <span data-content="eixides">💼 Eixides<br>professionals</span>
      <span data-content="calendari">📅 Calendari<br> d'admisió</span>
      <span data-content="matricula">📝 Matricula't</span>
    </div>
  </div>

  <!-- PANEL CENTRAL REAL -->
  <div id="dynamic-content" class="dynamic-content"></div>

</section>

<script src="js/banner-smx.js"></script>
</body>
</html>
